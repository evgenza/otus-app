server {
    listen 80;
    server_name zhemchugovei.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name zhemchugovei.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/zhemchugovei.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhemchugovei.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  443;

    location /auth/ {
        proxy_pass http://keycloak:8080;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # Логин через Keycloak для сервисов без своей авторизации
    location /oauth2/ {
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Uri   $request_uri;
    }

    location = /oauth2/auth {
        internal;
        proxy_pass http://oauth2-proxy:4180;
        proxy_pass_request_body off;
        proxy_set_header Content-Length    "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Uri   $request_uri;
    }

    location @oauth2_signin {
        return 302 https://$host/oauth2/start?rd=$request_uri;
    }

    location /prometheus/ {
        auth_request /oauth2/auth;
        error_page 401 = @oauth2_signin;
        proxy_pass http://prometheus:9090/;
    }

    location /alertmanager/ {
        auth_request /oauth2/auth;
        error_page 401 = @oauth2_signin;
        proxy_pass http://alertmanager:9093/;
    }

    location /jaeger/ {
        auth_request /oauth2/auth;
        error_page 401 = @oauth2_signin;
        proxy_pass http://jaeger:16686;
    }

    location /kibana/ {
        auth_request /oauth2/auth;
        error_page 401 = @oauth2_signin;
        proxy_pass http://kibana:5601;
    }

    location /gw/ {
        proxy_pass http://gateway:8090;
    }

    # Публичный API app: nginx ходит в него по mTLS с клиентским сертификатом
    location / {
        proxy_pass https://app:8080;
        proxy_ssl_certificate         /etc/nginx/certs/nginx.crt;
        proxy_ssl_certificate_key     /etc/nginx/certs/nginx.key;
        proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_name                app;
    }
}
