services:
  app:
    image: evgenza/otus-app:${TAG:-latest}
    container_name: otus-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://otus:otus@db:5432/otus?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  db:
    image: postgres:16-alpine
    container_name: otus-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=otus
      - POSTGRES_PASSWORD=otus
      - POSTGRES_DB=otus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus -d otus"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
