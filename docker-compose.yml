services:
  app:
    image: evgenza/otus-app:${TAG:-latest}
    container_name: otus-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
