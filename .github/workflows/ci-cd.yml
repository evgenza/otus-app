name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: otus-app
  GO_VERSION: "1.26"

jobs:
  # --------------------------------------------------------------------------
  # Этап 1: проверка линтером и форматированием
  # --------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  # --------------------------------------------------------------------------
  # Этап 2: юнит-тесты (блокирующий этап перед упаковкой) и контрольная компиляция
  # --------------------------------------------------------------------------
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run unit tests
        run: go test -race -cover ./...

      - name: Build check
        run: go build ./...

  # --------------------------------------------------------------------------
  # Этап 3: сборка Docker-образа и публикация в Docker Hub
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Этап 4: деплой на собственный сервер по SSH
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Copy observability stack to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "observability"
          target: "~"

      - name: Render Alertmanager config and restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/observability
            cat > alertmanager/alertmanager.yml <<EOF
            global:
              smtp_smarthost: "smtp.yandex.ru:587"
              smtp_from: "${{ secrets.SMTP_USERNAME }}"
              smtp_auth_username: "${{ secrets.SMTP_USERNAME }}"
              smtp_auth_password: "${{ secrets.SMTP_PASSWORD }}"
              smtp_require_tls: true
            route:
              receiver: email
              group_wait: 10s
              group_interval: 1m
              repeat_interval: 1h
            receivers:
              - name: email
                email_configs:
                  - to: "${{ secrets.SMTP_TO }}"
                    send_resolved: true
                    headers:
                      subject: "[otus-app] {{ .Status | toUpper }}: {{ .CommonAnnotations.summary }}"
            EOF

            # Гасим прежний app+db стек, если остался от старого деплоя
            if [ -d ~/otus-app ]; then (cd ~/otus-app && docker compose down) || true; fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export TAG=latest
            docker compose -f docker-compose.server.yml pull
            docker compose -f docker-compose.server.yml up -d
            docker compose -f docker-compose.server.yml ps
