name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: otus-app
  GO_VERSION: "1.26"

jobs:
  # --------------------------------------------------------------------------
  # Этап 1: проверка линтером и форматированием
  # --------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  # --------------------------------------------------------------------------
  # Этап 2: юнит-тесты (блокирующий этап перед упаковкой) и контрольная компиляция
  # --------------------------------------------------------------------------
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run unit tests
        run: go test -race -cover ./...

      - name: Build check
        run: go build ./...

  # --------------------------------------------------------------------------
  # Этап 3: сборка Docker-образа и публикация в Docker Hub
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Этап 4: деплой на собственный сервер по SSH
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Render Alertmanager config
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          envsubst '$SMTP_USERNAME $SMTP_PASSWORD $SMTP_TO' \
            < observability/alertmanager/alertmanager.yml.tmpl \
            > observability/alertmanager/alertmanager.yml
          docker run --rm -v "$PWD/observability/alertmanager:/cfg:ro" \
            --entrypoint /bin/amtool prom/alertmanager:v0.27.0 \
            check-config /cfg/alertmanager.yml

      - name: Render Keycloak realm
        env:
          GRAFANA_OAUTH_SECRET: ${{ secrets.GRAFANA_OAUTH_SECRET }}
          OAUTH2_PROXY_CLIENT_SECRET: ${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}
          DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
        run: |
          envsubst '$GRAFANA_OAUTH_SECRET $OAUTH2_PROXY_CLIENT_SECRET $DEMO_USER_PASSWORD' \
            < observability/keycloak/realm-otus.json.tmpl \
            > observability/keycloak/realm-otus.json
          python3 -m json.tool observability/keycloak/realm-otus.json > /dev/null

      - name: Copy observability stack to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "observability"
          target: "~"

      - name: Restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/observability

            # Внутренний CA и сертификаты mTLS (генерируются один раз)
            sh certs/gen-certs.sh

            # Секреты для docker compose
            umask 077
            cat > .env <<'ENV'
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            GRAFANA_OAUTH_SECRET=${{ secrets.GRAFANA_OAUTH_SECRET }}
            OAUTH2_PROXY_CLIENT_SECRET=${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}
            OAUTH2_PROXY_COOKIE_SECRET=${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
            ENV
            umask 022

            # Сертификат Let's Encrypt (выпускается один раз, дальше продлевает certbot)
            if [ ! -f letsencrypt/live/zhemchugovei.duckdns.org/fullchain.pem ]; then
              docker rm -f otus-nginx 2>/dev/null || true
              docker run --rm -p 80:80 \
                -v "$PWD/letsencrypt:/etc/letsencrypt" \
                certbot/certbot:v2.11.0 certonly --standalone \
                -d zhemchugovei.duckdns.org \
                --agree-tos --register-unsafely-without-email --non-interactive
            fi

            # Гасим прежний app+db стек, если остался от старого деплоя
            if [ -d ~/otus-app ]; then (cd ~/otus-app && docker compose down) || true; fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export TAG=latest

            # База для Keycloak в общем Postgres
            docker compose -f docker-compose.server.yml up -d db
            for i in $(seq 1 30); do
              docker exec otus-db pg_isready -U otus -d otus >/dev/null 2>&1 && break
              sleep 2
            done
            docker exec otus-db psql -U otus -d otus -tc "SELECT 1 FROM pg_database WHERE datname='keycloak'" | grep -q 1 \
              || docker exec otus-db createdb -U otus keycloak

            docker compose -f docker-compose.server.yml pull
            docker compose -f docker-compose.server.yml up -d
            docker compose -f docker-compose.server.yml ps
