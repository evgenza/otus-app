name: Integration tests

on:
  workflow_dispatch:

jobs:
  integration:
    name: Integration (API + Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: otus
          POSTGRES_PASSWORD: otus
          POSTGRES_DB: otus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U otus -d otus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgres://otus:otus@localhost:5432/otus?sslmode=disable

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run integration tests
        run: go test -tags=integration -race -v ./...
