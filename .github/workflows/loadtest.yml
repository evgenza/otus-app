name: Load test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Базовый URL развёрнутого сервиса"
        default: "https://zhemchugovei.duckdns.org"

jobs:
  k6:
    name: k6 load test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run k6
        run: |
          docker run --rm -i \
            -e BASE_URL="${{ inputs.base_url }}" \
            -e AUTH_USER=evgenza \
            -e AUTH_PASS="${{ secrets.DEMO_USER_PASSWORD }}" \
            -v "$PWD/loadtest:/loadtest" \
            grafana/k6 run /loadtest/script.js
